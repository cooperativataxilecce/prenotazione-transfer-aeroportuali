<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Transfer Aeroportuale | Cooperativa Taxi Lecce</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:40px;

}

.container{

background:#fff;
width:100%;
max-width:650px;
padding:35px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.15);

}

.logo{

display:block;
margin:auto;
width:180px;
margin-bottom:20px;

}

h2{

text-align:center;
color:#111;
margin-bottom:10px;

}

p{

text-align:center;
color:#666;
font-size:14px;
line-height:1.6;
margin-bottom:30px;

}

label{

display:block;
font-weight:bold;
margin-bottom:8px;
margin-top:20px;

}

select{

width:100%;
padding:14px;
font-size:15px;
border:1px solid #ddd;
border-radius:10px;
background:#fff;

}

button{

width:100%;
margin-top:35px;
padding:16px;
background:#f39c12;
color:white;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#d87f00;

}

</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo" alt="Cooperativa Taxi Lecce">

<h2>Transfer Aeroportuale</h2>

<p>
Seleziona il tipo di transfer e l'aeroporto di riferimento.
</p>

<form>

<label>Di quale servizio hai bisogno?</label>

<select required>

<option value="">Seleziona...</option>

<option>Ho bisogno di un transfer verso l'aeroporto</option>

<option>Ho bisogno di un transfer dall'aeroporto</option>

</select>

<label>Aeroporto</label>

<select required>

<option value="">Seleziona un aeroporto...</option>

<option>Aeroporto del Salento - Brindisi (BDS)</option>

<option>Aeroporto Internazionale Karol Wojtyła - Bari (BRI)</option>

</select>

<button type="submit">
Continua
</button>

</form>

</div>

</body>

</html>
