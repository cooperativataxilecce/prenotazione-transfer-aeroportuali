<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Transfer Aeroportuale | Cooperativa Taxi Lecce</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:40px;

}


.container{

background:white;
max-width:650px;
width:100%;
padding:35px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.15);

}

.logo{

display:block;
margin:auto;
width:400px;
max-width:100%;
margin-bottom:25px;

}


h2{

text-align:center;
color:#111;
margin-bottom:10px;

}


.info{

text-align:center;
font-size:14px;
color:#666;
line-height:1.5;
margin-bottom:30px;

}


label{

display:block;
font-weight:bold;
margin-top:20px;
margin-bottom:8px;

}


select{

width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
background:white;

}


button{

width:100%;
margin-top:35px;
padding:16px;
background:#f39c12;
color:white;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;

}


button:hover{

background:#d87f00;

}

</style>

</head>


<body>


<div class="container">


<img src="logo3.png" class="logo">


<h2>Transfer Aeroportuale</h2>


<p class="info">
Scegli il tipo di transfer e l'aeroporto. 
Ti guideremo nella richiesta del servizio.
</p>



<label>
Tipo di transfer
</label>


<select id="tipo">

<option value="">
Seleziona...
</option>

<option value="verso">
Devo raggiungere l'aeroporto
</option>

<option value="da">
Devo essere prelevato dall'aeroporto
</option>

</select>




<label>
Aeroporto
</label>


<select id="aeroporto">


<option value="">
Seleziona aeroporto...
</option>


<option value="Aeroporto del Salento - Brindisi (BDS)">
Aeroporto di Brindisi
</option>


<option value="Aeroporto Internazionale di Bari (BRI)">
Aeroporto di Bari
</option>


</select>



<button onclick="continua()">
Continua
</button>



</div>




<script>


function continua(){


let tipo=document.getElementById("tipo").value;

let aeroporto=document.getElementById("aeroporto").value;



if(tipo=="" || aeroporto==""){

alert("Seleziona il tipo di transfer e l'aeroporto.");

return;

}



window.location.href=
"prenotazione.html?tipo="
+tipo+
"&aeroporto="
+encodeURIComponent(aeroporto);



}


</script>


</body>

</html>
