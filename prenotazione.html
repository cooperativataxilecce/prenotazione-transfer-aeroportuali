<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Richiesta Transfer | Cooperativa Taxi Lecce</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.container{
background:white;
max-width:650px;
width:100%;
padding:35px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.logo{

display:block;
margin:auto;
width:400px;
max-width:100%;
margin-bottom:25px;

}

h2{
text-align:center;
color:#111;
margin-bottom:10px;
}

.info{
text-align:center;
font-size:13px;
color:#666;
line-height:1.5;
margin-bottom:25px;
}

label{
font-weight:bold;
display:block;
margin-top:18px;
margin-bottom:6px;
}

input, textarea{

width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;

}

textarea{
height:120px;
resize:vertical;
}

.volo-info{
font-size:12px;
color:#777;
margin-top:5px;
line-height:1.5;
}

.privacy{

margin-top:25px;
display:flex;
align-items:center;
gap:8px;
font-size:14px;
color:#555;

}

.privacy input{
width:auto;
}

.privacy label{
margin:0;
font-weight:normal;
}

.privacy a{
color:#f39c12;
}

button{

width:100%;
margin-top:30px;
padding:16px;
background:#f39c12;
border:none;
color:white;
font-size:18px;
font-weight:bold;
border-radius:12px;
cursor:pointer;

}

button:hover{
background:#d87f00;
}

</style>

</head>


<body>


<div class="container">


<img src="logo3.png" class="logo">


<h2>Richiesta Transfer Aeroportuale</h2>


<p class="info">
Completa i dati per richiedere il tuo transfer.
La prenotazione sarà confermata dalla Cooperativa Taxi Lecce.
</p>



<form id="form">


<label>
Nome e Cognome
</label>

<input type="text" id="nome" required>



<label>
Numero di telefono
</label>

<input type="tel" id="telefono" required>



<label>
Indirizzo di partenza
</label>

<input type="text" id="partenza" required>



<label>
Indirizzo di arrivo
</label>

<input type="text" id="arrivo" required>



<div id="voloBox" style="display:none;">


<label>
Numero del volo (facoltativo)
</label>

<input type="text" id="volo">


<p class="volo-info">
Consigliamo di indicare il numero del volo per consentirci di monitorare l'arrivo e garantire un servizio efficiente e puntuale.
</p>


</div>



<label>
Orario
</label>

<input type="time" id="ora" required>



<label>
Data
</label>

<input type="date" id="data" required>



<label>
Numero passeggeri
</label>

<input type="number" id="passeggeri" min="1" required>



<label>
Note extra (facoltativo)
</label>

<textarea id="note"></textarea>



<div class="privacy">

<input type="checkbox" id="privacy" required>

<label>

Dichiaro di aver letto e accettato

<a href="https://www.cooperativataxilecce.it/pagina/informativa-sulla-privacy" target="_blank">
l'informativa sulla privacy
</a>

</label>

</div>



<button type="submit">
Invia richiesta su WhatsApp
</button>



</form>


</div>




<script>


const parametri = new URLSearchParams(window.location.search);


const tipo = parametri.get("tipo");

const aeroporto = parametri.get("aeroporto");



if(tipo === "verso"){

document.getElementById("arrivo").value = aeroporto;

}



if(tipo === "da"){

document.getElementById("partenza").value = aeroporto;

document.getElementById("voloBox").style.display = "block";

}




document.getElementById("form").addEventListener("submit", function(e){


e.preventDefault();



if(!document.getElementById("privacy").checked){

alert("Devi accettare l'informativa sulla privacy per procedere.");

return;

}



let messaggio =

`Richiesta Transfer Aeroportuale

Nome:
${nome.value}

Telefono:
${telefono.value}

Partenza:
${partenza.value}

Arrivo:
${arrivo.value}

Numero volo:
${volo.value || "Non indicato"}

Orario:
${ora.value}

Data:
${data.value}

Numero passeggeri:
${passeggeri.value}

Note:
${note.value || "Nessuna"}

Il cliente ha accettato l'informativa sulla privacy.`;


let url =
"https://wa.me/393286714428?text="
+ encodeURIComponent(messaggio);


window.open(url,"_blank");


});


</script>


</body>

</html>
